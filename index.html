<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming App Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        h1 { color: #ffffff; margin-bottom: 30px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }
        .card {
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #007bff;
        }
        .card h2 { margin-top: 0; color: #007bff; }
        .card p { font-size: 0.9em; color: #bbb; }
    </style>
</head>
<body>

    <h1>My Web Apps</h1>

    <div class="grid">
        <a href="https://sevcav.github.io/BloodBowl-Pitch-Tactics/" class="card">
            <h2>Pitch Tactics</h2>
            <p>Interactive pitch for planning plays and positioning.</p>
        </a>

        <a href="https://sevcav.github.io/your-new-repo/" class="card">
            <h2>Upcoming Tool</h2>
            <p>Description of your next smaller utility or app.</p>
        </a>
    </div>

</body>
</html>
